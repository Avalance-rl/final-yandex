services:
  db:
    image: postgres:16-alpine
    container_name: teamfinder_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-teamfinder}
      POSTGRES_USER: ${POSTGRES_USER:-teamfinder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teamfinder}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-teamfinder} -d ${POSTGRES_DB:-teamfinder}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: teamfinder_web
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./:/app

volumes:
  postgres_data:
